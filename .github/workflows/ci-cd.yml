name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  # ===== STAGE 1: TEST =====
  test:
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        python-version: ['3.11']
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest pytest-asyncio httpx
    
    - name: Run tests (using pre-trained model artifacts)
      run: |
        pytest tests/ -v --tb=short
  
  # ===== STAGE 2: BUILD =====
  build:
    runs-on: ubuntu-latest
    needs: test
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Build Docker image
      run: |
        docker build -t credit-scoring-api:${{ github.sha }} .
    
    - name: Run smoke test
      run: |
        docker run -d -p 8000:8000 --name api credit-scoring-api:${{ github.sha }}
        sleep 10
        curl --fail http://localhost:8000/health || (docker logs api && exit 1)
        docker stop api || true
        docker rm api || true
  
  # ===== STAGE 3: DEPLOY =====
  deploy:
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_TOKEN }}
    
    - name: Build and Push Docker image to Docker Hub
      run: |
        docker build -t ${{ secrets.DOCKER_USERNAME }}/credit-scoring-api:latest .
        docker push ${{ secrets.DOCKER_USERNAME }}/credit-scoring-api:latest